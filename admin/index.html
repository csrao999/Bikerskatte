<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Bikers Katte — Gallery Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Matches the site's own tokens so the CMS doesn't feel like a bolted-on tool */
    :root{
      --bg:#0E0E10;--surface:#161719;--ink:#F2F0ED;--accent:#FF6A00;
    }
    html,body{background:var(--bg);color:var(--ink);font-family:"Barlow",system-ui,sans-serif;margin:0}
    #nc-root{min-height:100vh}
    .cms-boot{
      min-height:100vh;display:grid;place-items:center;text-align:center;
      font-family:"Barlow Condensed",system-ui,sans-serif;
    }
    .cms-boot b{
      display:block;font-size:14px;letter-spacing:.18em;text-transform:uppercase;
      color:var(--accent);margin-bottom:10px;
    }
  </style>
</head>
<body>
  <div class="cms-boot" id="boot"><div><b>Bikers Katte</b>Loading the gallery editor…</div></div>
  <div id="nc-root"></div>

  <!-- Decap CMS — pulled from CDN, nothing to install or build -->
  <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>

  <script>
    /* Theme the login screen and toolbar to the club's orange, not Decap's default teal */
    window.CMS_MANUAL_INIT = false;
    document.addEventListener("DOMContentLoaded", function(){
      var b = document.getElementById("boot");
      if (b) setTimeout(function(){ b.remove(); }, 4000);
    });
  </script>
</body>
</html>
